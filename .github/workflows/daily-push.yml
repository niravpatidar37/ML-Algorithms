name: Daily ML Auto-Commit

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC = 7:30 AM IST daily
  workflow_dispatch:        # Manual trigger button in Actions tab

permissions:
  contents: write           # ← THIS IS THE KEY FIX

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily note generator
        run: python generate_daily_note.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "📚 Daily ML update: $(date +'%Y-%m-%d')"
          git push